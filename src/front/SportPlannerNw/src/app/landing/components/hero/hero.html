<section class="relative min-h-[100dvh] flex items-center pt-24 pb-12 overflow-hidden bg-background">
  <div class="container mx-auto px-6 relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
    
    <!-- Content Left -->
    <div class="flex flex-col items-start text-left">

      
      <h1 class="text-5xl lg:text-7xl font-bold leading-[1.1] mb-6 tracking-tight text-foreground">
        Planificación <br>
        Deportiva de <br>
        <span class="text-primary">Alto Rendimiento</span>
      </h1>
      
      <p class="text-xl text-muted-foreground mb-10 leading-relaxed max-w-[90%]">
        La suite definitiva para entrenadores de baloncesto, fútbol y balonmano. 
        Diseña sesiones, gestiona tu equipo y analiza el rendimiento en una sola plataforma.
      </p>
      
      <div class="flex flex-wrap gap-4 mb-12">
        <a routerLink="/auth/register" class="btn btn-primary text-lg px-8 py-4 cursor-pointer">
          Empezar Gratis
        </a>
        <button class="btn btn-ghost text-lg px-6 py-4 flex items-center gap-2">
          Ver Tour Interactivo
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
      </div>

      <div class="flex flex-col gap-2">
        <span class="text-sm font-semibold text-muted-foreground uppercase tracking-wider">Confían en nosotros:</span>
        <div class="flex gap-6 opacity-60 grayscale hover:grayscale-0 transition-all font-bold text-foreground text-lg">
           <!-- Text placeholders for logos -->
           <span>LIGA ENDESA</span>
           <span>RFEF</span>
           <span>ASOBAL</span>
        </div>
      </div>
    </div>

    <!-- Visual Right with 3D Effect using Arbitrary Values -->
    <div class="relative w-full aspect-video [perspective:1000px] mt-12 lg:mt-0 group">
       <!-- Glow behind -->
       <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-primary/20 blur-[100px] rounded-full -z-10 pointer-events-none"></div>
       
       <!-- 3D Card -->
       <div class="relative w-full h-full bg-background/90 dark:bg-slate-900/90 backdrop-blur-xl border border-border rounded-xl shadow-2xl overflow-hidden
                   transform transition-transform duration-700 ease-out 
                   rotate-y-[-10deg] rotate-x-[5deg] 
                   group-hover:rotate-y-0 group-hover:rotate-x-0">
          
          <!-- UI Header -->
          <div class="h-8 border-b border-border flex items-center px-4 gap-3 bg-muted/50">
            <div class="flex gap-1.5">
              <span class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
              <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
              <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
            </div>
            <div class="flex-1 h-5 bg-muted rounded flex items-center px-2 text-[10px] text-muted-foreground">
              sportplanner.app/dashboard
            </div>
          </div>

          <!-- UI Body Mockup -->
          <div class="absolute inset-0 top-8 flex">
            <!-- Sidebar -->
            <div class="w-[20%] border-r border-border bg-muted/30 p-3 flex flex-col gap-2">
               <div class="w-full h-4 bg-muted rounded-md mb-2"></div>
               <div class="w-2/3 h-3 bg-muted/70 rounded-md"></div>
               <div class="w-3/4 h-3 bg-muted/70 rounded-md"></div>
               <div class="w-1/2 h-3 bg-muted/70 rounded-md"></div>
            </div>
            
            <!-- Dashboard Content -->
            <div class="flex-1 p-4 grid grid-rows-[2fr_1fr] gap-4 bg-background">
               <!-- Widget Chart -->
               <div class="bg-muted/40 rounded-lg p-3 relative overflow-hidden">
                  <div class="absolute bottom-0 left-0 right-0 h-1/2 flex items-end justify-between px-2 gap-1 opacity-50">
                     <div class="w-full bg-primary/40 rounded-t h-[40%]"></div>
                     <div class="w-full bg-primary/60 rounded-t h-[70%]"></div>
                     <div class="w-full bg-primary/80 rounded-t h-[50%]"></div>
                     <div class="w-full bg-primary rounded-t h-[80%]"></div>
                     <div class="w-full bg-primary/70 rounded-t h-[60%]"></div>
                  </div>
               </div>
               <!-- Widget Row -->
               <div class="grid grid-cols-2 gap-4">
                 <div class="bg-muted/40 rounded-lg"></div>
                 <div class="bg-muted/40 rounded-lg"></div>
               </div>
            </div>
          </div>
       </div>
    </div>
  </div>
</section>
