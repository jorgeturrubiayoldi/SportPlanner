<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-background p-4">
    <!-- Background Decor -->
    <div class="absolute -top-20 -left-20 w-96 h-96 rounded-full blur-3xl bg-primary/20 pointer-events-none"></div>
    <div class="absolute -bottom-20 -right-20 w-96 h-96 rounded-full blur-3xl bg-secondary/10 pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass-card p-8 md:p-10 space-y-8">
            <div class="text-center space-y-2">
                <h1 class="text-3xl font-bold tracking-tight text-foreground">
                    Bienvenido a <span class="text-primary">SportPlanner</span>
                </h1>
                <p class="text-muted-foreground text-sm">
                    Gestiona tu equipo como un profesional
                </p>
            </div>

            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
                <!-- Email -->
                <div class="space-y-2">
                    <label for="email" class="text-sm font-medium leading-none text-foreground">
                        Email
                    </label>
                    <input
                        id="email"
                        type="email"
                        formControlName="email"
                        placeholder="entrenador@ejemplo.com"
                        class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 transition-all"
                        [class.border-destructive]="form.controls.email.invalid && form.controls.email.touched"
                    >
                    @if (form.controls.email.invalid && form.controls.email.touched) {
                        <span class="text-xs text-destructive">Por favor ingresa un email válido</span>
                    }
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <label for="password" class="text-sm font-medium leading-none text-foreground">
                            Contraseña
                        </label>
                        <a href="#" class="text-xs text-primary hover:underline font-medium">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
                    <div class="relative">
                        <input
                            id="password"
                            [type]="showPassword() ? 'text' : 'password'"
                            formControlName="password"
                            class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm text-foreground ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 transition-all pr-12"
                        >
                        <button
                            type="button"
                            (click)="togglePassword()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors p-1"
                        >
                            <span class="text-[10px] uppercase font-bold tracking-wider">{{ showPassword() ? 'Ocultar' : 'Ver' }}</span>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                @if (errorMessage()) {
                    <div class="bg-destructive/10 border border-destructive/20 rounded-md p-3 text-sm text-destructive">
                        {{ errorMessage() }}
                    </div>
                }

                <button
                    type="submit"
                    [disabled]="form.invalid || loading()"
                    class="btn btn-primary w-full shadow-lg shadow-primary/20 relative"
                >
                    @if (loading()) {
                        <span class="opacity-0">Iniciar Sesión</span>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="w-5 h-5 border-2 border-primary-foreground/30 border-t-primary-foreground rounded-full animate-spin"></div>
                        </div>
                    } @else {
                        <span>Iniciar Sesión</span>
                    }
                </button>
            </form>

             <div class="text-center text-sm pt-4">
                <span class="text-muted-foreground">¿No tienes una cuenta? </span>
                <a routerLink="/auth/register" class="text-primary font-semibold hover:underline cursor-pointer ml-1">
                    Regístrate Gratis
                </a>
            </div>
        </div>
    </div>
</div>
