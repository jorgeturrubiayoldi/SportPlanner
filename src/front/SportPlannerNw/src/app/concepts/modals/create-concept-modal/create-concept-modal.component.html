<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-background/80 backdrop-blur-sm animate-in fade-in duration-200">
  <div class="w-full max-w-lg bg-card border border-border rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
    
    <!-- Header -->
    <div class="px-6 py-4 border-b border-border/50 flex items-center justify-between">
      <h2 class="text-xl font-bold text-foreground">
        {{ isEditMode() ? 'Editar Concepto' : 'Nuevo Concepto' }}
      </h2>
      <button 
        (click)="onClose()"
        class="text-muted-foreground hover:text-foreground transition-colors p-1 rounded-lg hover:bg-accent">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <!-- Body -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
      
      <!-- Category Info (Read only) -->
      @if (category) {
        <div class="p-3 rounded-xl bg-primary/5 border border-primary/10 flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div>
            <p class="text-xs text-muted-foreground uppercase tracking-wider font-bold">Categoría</p>
            <p class="text-sm font-medium text-foreground">{{ category.name }}</p>
          </div>
        </div>
      }

      <!-- Name -->
      <div class="space-y-2">
        <label class="text-sm font-medium text-foreground">Nombre del Concepto</label>
        <input 
          type="text" 
          formControlName="name"
          class="w-full px-4 py-2.5 rounded-xl bg-muted/30 border border-input focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-muted-foreground/50"
          placeholder="Ej. Bote entre las piernas">
      </div>

      <!-- Description -->
      <div class="space-y-2">
        <label class="text-sm font-medium text-foreground">Descripción</label>
        <textarea 
          formControlName="description"
          rows="3"
          class="w-full px-4 py-2.5 rounded-xl bg-muted/30 border border-input focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-muted-foreground/50 resize-none"
          placeholder="Describe los detalles técnicos..."></textarea>
      </div>

      <!-- Difficulty -->
      <div class="space-y-2">
        <label class="text-sm font-medium text-foreground flex justify-between">
          Dificultad
          <span class="text-primary font-bold">{{ form.get('difficultyLevel')?.value }} / 5</span>
        </label>
        <input 
          type="range" 
          min="1" 
          max="5" 
          step="1"
          formControlName="difficultyLevel"
          class="w-full h-2 bg-muted rounded-lg appearance-none cursor-pointer accent-primary">
        <div class="flex justify-between text-xs text-muted-foreground px-1">
          <span>Básico</span>
          <span>Avanzado</span>
        </div>
      </div>

      <!-- Video URL -->
      <div class="space-y-2">
        <label class="text-sm font-medium text-foreground">Video URL (Opcional)</label>
        <div class="relative">
          <input 
            type="url" 
            formControlName="videoUrl"
            class="w-full pl-10 px-4 py-2.5 rounded-xl bg-muted/30 border border-input focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-muted-foreground/50"
            placeholder="https://youtube.com/...">
          <div class="absolute left-3 top-2.5 text-muted-foreground">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="pt-4 flex gap-3">
        <button 
          type="button" 
          (click)="onClose()"
          class="flex-1 btn btn-outline border-border hover:bg-muted text-foreground font-bold py-2.5 rounded-xl transition-all">
          Cancelar
        </button>
        <button 
          type="submit" 
          [disabled]="form.invalid || loading()"
          class="flex-1 btn btn-primary shadow-lg shadow-primary/20 font-bold py-2.5 rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          @if (loading()) {
            <span class="animate-spin mr-2">⏳</span> Guardando...
          } @else {
            {{ isEditMode() ? 'Actualizar' : 'Crear Concepto' }}
          }
        </button>
      </div>

    </form>
  </div>
</div>
