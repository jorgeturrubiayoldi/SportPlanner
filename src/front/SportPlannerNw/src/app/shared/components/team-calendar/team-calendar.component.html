<div class="p-4 bg-card rounded-lg border border-border shadow-sm">
  
  <!-- Header: Navigation -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-bold capitalize text-foreground flex items-center gap-2">
      {{ monthLabel() | titlecase }}
    </h2>
    
    <div class="flex items-center gap-1">
      <button (click)="previousMonth()" class="btn btn-icon btn-ghost btn-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <button (click)="goToToday()" class="btn btn-ghost btn-xs text-xs">Today</button>
      <button (click)="nextMonth()" class="btn btn-icon btn-ghost btn-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  <!-- Calendar Grid -->
  <div class="grid grid-cols-7 gap-px bg-border/40 rounded-lg overflow-hidden border border-border/40">
    
    <!-- Weekday Headers -->
    @for (day of weekDays; track day) {
        <div class="p-2 text-center text-xs font-semibold text-muted-foreground bg-muted/30 uppercase tracking-widest">
            {{ day }}
        </div>
    }

    <!-- Days -->
    @for (day of calendarGrid(); track $index) {
        <div 
            class="min-h-[100px] p-2 bg-card relative group transition-colors hover:bg-muted/10"
            [class.bg-muted]="!day.isCurrentMonth"
            [class.bg-card]="day.isCurrentMonth"
        >
            <!-- Date Number -->
            <div class="flex justify-between items-start">
               <span 
                class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full"
                [class.bg-primary]="day.isToday"
                [class.text-primary-foreground]="day.isToday"
                [class.text-muted-foreground]="!day.isCurrentMonth"
                [class.text-foreground]="day.isCurrentMonth && !day.isToday"
               >
                   {{ day.date | date:'d' }}
               </span>
            </div>

            <!-- Sessions List -->
            <div class="mt-2 space-y-1">
                @for (session of day.sessions; track session.planId) {
                    <div class="text-xs px-1.5 py-0.5 rounded bg-primary/10 text-primary border border-primary/20 truncate font-medium" 
                         [title]="session.title">
                        {{ session.title }}
                    </div>
                }
            </div>

        </div>
    }

  </div>
</div>
