<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-background/80 backdrop-blur-sm animate-in fade-in duration-300">
  <div class="glass-card w-full max-w-md p-8 relative overflow-hidden animate-in zoom-in-95 duration-300">
    <!-- Glow Effect -->
    <div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-secondary/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="relative z-10 text-center mb-8">
      <div class="w-16 h-16 bg-primary/10 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4 border border-primary/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-foreground tracking-tight">Bienvenido a SportPlanner</h2>
      <p class="mt-2 text-muted-foreground">Para comenzar, necesitas crear tu primera <span class="text-primary font-semibold">Temporada</span>.</p>
    </div>
    
    <div class="space-y-6">
      <div class="space-y-2">
        <label for="seasonName" class="text-sm font-medium text-foreground ml-1">Nombre de la Temporada</label>
        <input 
          type="text" 
          id="seasonName" 
          [(ngModel)]="seasonName" 
          placeholder="Ej: Temporada 2025/2026"
          class="w-full bg-muted/50 border border-border rounded-xl px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
        >
      </div>

      <div class="space-y-2">
        <label for="startDate" class="text-sm font-medium text-foreground ml-1">Fecha de Inicio</label>
        <input 
          type="date" 
          id="startDate" 
          [(ngModel)]="startDate"
          class="w-full bg-muted/50 border border-border rounded-xl px-4 py-3 text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
        >
      </div>

      <div class="flex flex-col sm:flex-row gap-3 pt-4">
        <button 
          (click)="onLogout()"
          class="flex-1 px-6 py-3 rounded-xl font-medium text-muted-foreground hover:text-foreground hover:bg-muted/80 transition-all duration-200"
        >
          Cerrar sesión
        </button>
        <button 
          (click)="onCreate()" 
          [disabled]="!isValid() || loading"
          class="flex-[1.5] bg-primary text-primary-foreground hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed px-6 py-3 rounded-xl font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2"
        >
          @if (loading) {
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Creando...</span>
          } @else {
            <span>Crear Temporada</span>
          }
        </button>
      </div>
    </div>
  </div>
</div>
