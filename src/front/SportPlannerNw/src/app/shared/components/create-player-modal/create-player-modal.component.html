<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-background/80 backdrop-blur-sm animate-in fade-in duration-300">
  <div class="glass-card w-full max-w-lg p-0 relative overflow-hidden animate-in zoom-in-95 duration-300 rounded-3xl border border-border/50 shadow-2xl">
    
    <!-- Header -->
    <div class="px-8 py-6 border-b border-border/50 bg-card/50">
      <h2 class="text-2xl font-extrabold tracking-tight text-foreground">{{ 'TEAMS.PLAYERS.CREATE_MODAL.TITLE' | translate }}</h2>
      <p class="text-muted-foreground text-sm mt-1">
        {{ 'TEAMS.PLAYERS.CREATE_MODAL.SUBTITLE' | translate }}
      </p>
    </div>

    <!-- Body -->
    <div class="p-8 space-y-6 bg-card/30">
      
      <!-- Error Message -->
      @if (errorMsg) {
        <div class="p-4 rounded-xl bg-destructive/10 border border-destructive/20 text-destructive text-sm font-medium animate-in slide-in-from-top-2">
          {{ errorMsg | translate }}
        </div>
      }

      <!-- Player Name -->
      <div class="space-y-2">
        <label for="playerName" class="text-sm font-bold text-foreground ml-1">{{ 'TEAMS.PLAYERS.CREATE_MODAL.NAME' | translate }} <span class="text-destructive">*</span></label>
        <input 
          type="text" 
          id="playerName" 
          [(ngModel)]="name" 
          [placeholder]="'TEAMS.PLAYERS.CREATE_MODAL.NAME_PLACEHOLDER' | translate"
          class="w-full bg-background border border-border rounded-xl px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
        >
      </div>

       <!-- Last Name -->
       <div class="space-y-2">
        <label for="playerLastName" class="text-sm font-bold text-foreground ml-1">{{ 'TEAMS.PLAYERS.CREATE_MODAL.LASTNAME' | translate }} <span class="text-xs font-normal text-muted-foreground">{{ 'COMMON.OPTIONAL' | translate }}</span></label>
        <input 
          type="text" 
          id="playerLastName" 
          [(ngModel)]="lastName" 
          [placeholder]="'TEAMS.PLAYERS.CREATE_MODAL.LASTNAME_PLACEHOLDER' | translate"
          class="w-full bg-background border border-border rounded-xl px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
        >
      </div>

      <div class="grid grid-cols-2 gap-4">
        <!-- Position -->
        <div class="space-y-2">
            <label for="position" class="text-sm font-bold text-foreground ml-1">{{ 'TEAMS.PLAYERS.CREATE_MODAL.POSITION' | translate }}</label>
            <select 
              id="position" 
              [(ngModel)]="position"
              class="w-full bg-background border border-border rounded-xl px-4 py-3 text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 appearance-none"
            >
              <option value="" disabled selected>{{ 'TEAMS.PLAYERS.CREATE_MODAL.SELECT_POSITION' | translate }}</option>
              <option value="Goalkeeper">{{ 'POSITIONS.GOALKEEPER' | translate }}</option>
              <option value="Defender">{{ 'POSITIONS.DEFENDER' | translate }}</option>
              <option value="Midfielder">{{ 'POSITIONS.MIDFIELDER' | translate }}</option>
              <option value="Forward">{{ 'POSITIONS.FORWARD' | translate }}</option>
            </select>
        </div>

        <!-- Number -->
        <div class="space-y-2">
            <label for="number" class="text-sm font-bold text-foreground ml-1">{{ 'TEAMS.PLAYERS.CREATE_MODAL.NUMBER' | translate }}</label>
            <input 
              type="number" 
              id="number" 
              [(ngModel)]="number" 
              placeholder="#"
              class="w-full bg-background border border-border rounded-xl px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
            >
        </div>
      </div>

      <!-- Email -->
      <div class="space-y-2">
        <label for="email" class="text-sm font-bold text-foreground ml-1">{{ 'TEAMS.PLAYERS.CREATE_MODAL.EMAIL' | translate }} <span class="text-xs font-normal text-muted-foreground">{{ 'COMMON.OPTIONAL' | translate }}</span></label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          [placeholder]="'TEAMS.PLAYERS.CREATE_MODAL.EMAIL_PLACEHOLDER' | translate"
          class="w-full bg-background border border-border rounded-xl px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
        >
      </div>

    </div>

    <!-- Footer -->
    <div class="px-8 py-6 border-t border-border/50 bg-card/50 flex flex-col sm:flex-row gap-3">
      <button 
        (click)="onClose()"
        class="flex-1 px-6 py-3 rounded-xl font-bold text-muted-foreground hover:text-foreground hover:bg-muted/80 transition-all duration-200"
      >
        {{ 'TEAMS.CREATE_MODAL.CANCEL_BUTTON' | translate }}
      </button>
      <button 
        (click)="onCreate()" 
        [disabled]="loading || !name"
        class="flex-[1.5] bg-secondary text-secondary-foreground hover:bg-secondary/90 disabled:opacity-50 disabled:cursor-not-allowed px-6 py-3 rounded-xl font-bold shadow-lg shadow-secondary/20 hover:shadow-secondary/30 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2"
      >
        @if (loading) {
          <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>{{ 'TEAMS.CREATE_MODAL.CREATING_BUTTON' | translate }}</span>
        } @else {
          <span>{{ 'TEAMS.CREATE_MODAL.CREATE_BUTTON' | translate }}</span>
        }
      </button>
    </div>

  </div>
</div>
